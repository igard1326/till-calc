<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Till Reconciliation</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        >
        <link rel="stylesheet" href="css/styles.css">
    </head>

    <body>
        <div class="page">
            <header class="page-header">
                <p class="brand">Till Calc</p>
                <h1>Till Reconciliation</h1>
                <p class="lede">Enter expected and actual amounts for each point of sale.</p>
            </header>

            <main class="layout">
                <form id="till-form" novalidate>
                    <section class="panel" aria-labelledby="expected-heading">
                        <h2 id="expected-heading">Expected Values</h2>
                        <div id="expected-fields" class="field-grid"></div>
                    </section>

                    <section class="panel" aria-labelledby="actual-heading">
                        <h2 id="actual-heading">Actual Values</h2>
                        <div id="actual-fields" class="field-grid"></div>
                    </section>

                    <div class="actions">
                        <button type="submit" class="btn-primary">Calculate</button>
                        <button type="reset" class="btn-secondary">Clear</button>
                    </div>
                </form>

                <section class="panel results" aria-labelledby="output-heading">
                    <h2 id="output-heading">Output</h2>
                    <p id="output-placeholder" class="placeholder">
                        Results will appear here after you calculate.
                    </p>
                    <div id="output" class="output" hidden></div>
                </section>
            </main>
        </div>

        <script src="js/values.js"></script>
        <script src="js/get_values.js"></script>
        <script src="js/main.js"></script>
    </body>
</html>
